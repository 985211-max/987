<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能晚点名系统 - 学生端</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-brand">📋 智能晚点名系统</div>
    <div class="navbar-right">
      <span id="userInfo" class="user-info"></span>
      <button class="btn btn-sm btn-outline" id="logoutBtn">退出</button>
    </div>
  </nav>

  <div class="container">
    <!-- Status Banner -->
    <div id="statusBanner" class="status-banner info">
      <span id="statusText">正在加载签到状态...</span>
    </div>

    <!-- Check-in Card -->
    <div class="card checkin-card" id="checkinSection">
      <div class="card-header">
        <h2>📍 今日晚点名</h2>
        <span id="sessionDate" class="badge"></span>
      </div>
      <div class="card-body text-center">
        <div id="checkinStatus" class="checkin-status">
          <div class="deadline-info" id="deadlineInfo"></div>
          <div class="countdown" id="countdown"></div>
        </div>
        <button id="checkinBtn" class="btn btn-success btn-large" style="display:none">
          ✅ 立即签到
        </button>
        <div id="checkinResult" class="checkin-result" style="display:none"></div>
        <div id="noSession" style="display:none" class="no-session">
          <div class="no-session-icon">😴</div>
          <p>今日暂无签到任务</p>
          <p class="hint">请等待老师发起签到</p>
        </div>
      </div>
    </div>

    <!-- My Records -->
    <div class="card">
      <div class="card-header">
        <h2>📊 我的签到记录</h2>
        <div class="stats-row" id="myStats"></div>
      </div>
      <div class="card-body">
        <div class="table-wrap">
          <table class="table" id="myRecordsTable">
            <thead>
              <tr>
                <th>日期</th>
                <th>班级</th>
                <th>签到时间</th>
                <th>截止时间</th>
                <th>状态</th>
              </tr>
            </thead>
            <tbody id="myRecordsTbody">
              <tr><td colspan="5" class="loading">加载中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/student.js"></script>
</body>
</html>
