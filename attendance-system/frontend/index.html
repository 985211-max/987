<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能晚点名系统 - 登录</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="logo">📋</div>
        <h1>智能晚点名系统</h1>
        <p>Smart Roll Call System</p>
      </div>

      <div class="tab-bar">
        <button class="tab active" data-tab="login">登 录</button>
        <button class="tab" data-tab="register">注 册</button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="form-section active">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" id="loginUsername" placeholder="请输入用户名" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="loginPassword" placeholder="请输入密码" autocomplete="current-password" required>
        </div>
        <div id="loginError" class="error-msg" style="display:none"></div>
        <button type="submit" class="btn btn-primary btn-block">登 录</button>
        <p class="hint-text">教师账号：teacher01 / teacher123<br>学生账号：stu001~stu005 / student123</p>
      </form>

      <!-- Register Form -->
      <form id="registerForm" class="form-section">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" id="regUsername" placeholder="设置登录用户名" required>
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="regPassword" placeholder="设置密码（6位以上）" required>
        </div>
        <div class="form-group">
          <label>姓名</label>
          <input type="text" id="regName" placeholder="请输入真实姓名" required>
        </div>
        <div class="form-group">
          <label>班级</label>
          <input type="text" id="regClass" placeholder="如：计算机2301班" required>
        </div>
        <div class="form-group">
          <label>学号（选填）</label>
          <input type="text" id="regStudentNo" placeholder="请输入学号">
        </div>
        <div id="regMsg" class="msg" style="display:none"></div>
        <button type="submit" class="btn btn-primary btn-block">注 册</button>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
